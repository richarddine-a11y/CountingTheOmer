<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sefirat HaOmer 2026 · ספירת העומר</title>
  <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1a1a">
<script>if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');</script>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<style>
  :root {
    --gold: #E8A000;
    --gold-light: #F5C842;
    --gold-pale: #FFF8E7;
    --gold-mid: #FFF0C0;
    --black: #1a1a1a;
    --brown: #7a6030;
    --brown-light: #a08040;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: linear-gradient(160deg, var(--gold-pale) 0%, var(--gold-mid) 50%, #FFE080 100%);
    font-family: Georgia, 'Times New Roman', serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-bottom: 48px;
  }

  /* ── Header ── */
  header {
    width: 100%;
    background: var(--black);
    color: var(--gold-light);
    text-align: center;
    padding: 18px 20px 14px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  header h1 {
    font-size: clamp(16px, 4vw, 22px);
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  header p {
    font-size: 17px;
    margin-top: 4px;
    opacity: 0.85;
    font-style: italic;
  }

  /* ── Banner (pre/post Omer, special days) ── */
  #status-banner {
    width: min(480px, 95vw);
    margin: 20px 0 0;
    border-radius: 16px;
    padding: 20px 24px;
    text-align: center;
    display: none;
  }
  #status-banner.pre  { background: var(--black); color: var(--gold-light); }
  #status-banner.post { background: var(--gold); color: var(--black); }
  #status-banner .big-emoji { font-size: 44px; display: block; margin-bottom: 10px; }
  #status-banner strong { font-size: 18px; display: block; margin-bottom: 6px; }
  #status-banner span { font-size: 13px; opacity: 0.8; }

  /* ── Card ── */
  #card {
    width: min(480px, 95vw);
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.12);
    margin: 20px 0 4px;
    position: relative;
    border: 3px solid var(--gold);
    background: var(--gold-pale);
  }

  #special-banner {
    background: var(--black);
    color: var(--gold-light);
    text-align: center;
    padding: 10px;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 1px;
    display: none;
  }

  #today-pill {
    position: absolute;
    top: 14px; right: 14px;
    background: var(--black);
    color: var(--gold-light);
    font-size: 10px;
    font-weight: 800;
    padding: 3px 10px;
    border-radius: 99px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    display: none;
    z-index: 10;
  }

  #card-top {
    background: var(--gold);
    padding: 20px 24px 16px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  #day-badge {
    width: 86px; height: 86px;
    border-radius: 50%;
    background: rgba(255,255,255,0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    flex-shrink: 0;
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
  }
  #day-badge .num {
    font-size: 36px;
    font-weight: 900;
    color: var(--black);
    line-height: 1;
  }
  #day-badge .lbl {
    font-size: 10px;
    font-weight: 700;
    color: var(--black);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  #day-label { flex: 1; }
  #day-label .of49 {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--black);
    opacity: 0.7;
  }
  #day-label .week-en {
    font-size: 12px;
    color: var(--black);
    opacity: 0.6;
    margin-top: 3px;
    font-style: italic;
  }

  /* Penguin SVG */
  #penguin { width: 76px; height: 76px; flex-shrink: 0; }

  #card-body { padding: 24px 24px 28px; }

  #emoji-display {
    font-size: 54px;
    display: block;
    text-align: center;
    margin-bottom: 16px;
  }

  #fact-text {
    font-size: 18px;
    line-height: 1.55;
    color: var(--black);
    font-weight: 500;
  }

  #source-text {
    font-size: 12px;
    color: var(--brown);
    margin-top: 10px;
    font-style: italic;
    letter-spacing: 0.5px;
  }

  #hebrew-box {
    margin-top: 20px;
    padding: 14px 16px;
    background: rgba(255,255,255,0.5);
    border-radius: 12px;
    text-align: center;
    direction: rtl;
    border-left: 4px solid var(--gold);
  }
  #hebrew-count {
    font-size: 16px;
    color: #4a3000;
    font-weight: 600;
    display: block;
  }
  #hebrew-weeks {
    font-size: 13px;
    color: var(--brown);
    margin-top: 4px;
    display: block;
  }

  /* ── Swipe hint ── */
  .swipe-hint {
    font-size: 11px;
    color: var(--brown-light);
    letter-spacing: 1px;
    margin: 2px 0 10px;
  }

  /* ── Nav buttons ── */
  #nav {
    display: flex;
    gap: 10px;
    width: min(480px, 95vw);
    margin-bottom: 14px;
  }
  .nav-btn {
    flex: 1;
    padding: 12px;
    background: var(--black);
    color: var(--gold-light);
    border: none;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1px;
    font-family: Georgia, serif;
    transition: opacity 0.15s;
  }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  #today-btn {
    flex: 1;
    padding: 12px;
    background: var(--gold);
    color: var(--black);
    border: none;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1px;
    font-family: Georgia, serif;
    display: none;
  }

  /* ── Progress ── */
  #progress-section {
    width: min(480px, 95vw);
    margin-bottom: 18px;
  }
  .progress-labels {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--brown);
    font-weight: 600;
    margin-bottom: 6px;
  }
  .progress-track {
    width: 100%;
    background: #e0d0b0;
    border-radius: 99px;
    height: 8px;
    overflow: hidden;
  }
  #progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    border-radius: 99px;
    transition: width 0.6s ease;
  }

  /* ── Day picker ── */
  #dots-section {
    width: min(480px, 95vw);
  }
  .dots-title {
    font-size: 11px;
    color: var(--brown);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 700;
    margin-bottom: 8px;
  }
  #dots-scroll {
    overflow-x: auto;
    padding-bottom: 6px;
  }
  #dots-inner {
    display: flex;
    gap: 4px;
    min-width: max-content;
    padding: 2px 2px 4px;
  }
  .dot-btn {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: none;
    font-size: 10px;
    font-weight: 600;
    cursor: pointer;
    flex-shrink: 0;
    transition: transform 0.12s, background 0.12s;
    font-family: Georgia, serif;
  }
  .dot-btn.shabbat { background: var(--black); color: var(--gold-light); font-weight: 700; }
  .dot-btn.regular { background: #e0d0b0; color: #5a4a20; }
  .dot-btn.active  { background: var(--gold) !important; color: var(--black) !important; font-weight: 900; transform: scale(1.2); }

  /* ── Footer ── */
  footer {
    margin-top: 32px;
    text-align: center;
    font-size: 12px;
    color: var(--brown-light);
  }
  footer p + p { margin-top: 4px; opacity: 0.7; }
</style>
</head>

<header>

        <rect x="24" y="20" width="32" height="3" rx="1" fill="#E8A000"/>

  </div>
  <div id="card-body">
    <span id="emoji-display"></span>
    <p id="fact-text"></p>
    <p id="source-text"></p>
    <div id="hebrew-box">

      <span id="hebrew-weeks"></span>
    </div>
  </div>
</div>

<p class="swipe-hint">&larr; swipe to navigate &rarr;</p>

<div id="nav">
  <button class="nav-btn" id="prev-btn" onclick="changeDay(-1)">&larr; Prev</button>
  <button id="today-btn" onclick="goToToday()">Today: <span id="today-day-num"></span></button>
  <button class="nav-btn" id="next-btn" onclick="changeDay(1)">Next &rarr;</button>
</div>

<div id="progress-section">

    <span id="prog-left">Day 1</span>
    <span id="prog-right">2% to Shavuot</span>
  </div>
  <div class="progress-track">
    <div id="progress-fill" style="width:2%"></div>
  </div>
</div>

<div id="dots-section">
  <div class="dots-title">Browse All Days</div>
  <div id="dots-scroll">
    <div id="dots-inner"></div>
  </div>
</div>

<footer>
  <p>Based on Hadar&rsquo;s Omer Counter</p>

</footer>

// ── Time logic ────────────────────────────────────────────────────────────────
// Day 1 begins evening of April 2, 2026 at 7:30 PM ET
// We use local time; users outside ET will be slightly off — acceptable for a personal site
function getOmerDay() {
  const now = new Date();
  const start = new Date("2026-04-02T19:30:00"); // local time interpretation
  const ms = now - start;
  if (ms < 0) return 0;           // not started
  const day = Math.floor(ms / 86400000) + 1;
  if (day > 49) return 50;        // finished
  return day;
}

function formatWeeksEnglish(day) {
  const w = Math.floor(day / 7), d = day % 7;
  if (w === 0) return `${day} day${day !== 1 ? "s" : ""}`;
  if (d === 0) return `${w} week${w !== 1 ? "s" : ""}`;
  return `${w} week${w !== 1 ? "s" : ""} and ${d} day${d !== 1 ? "s" : ""}`;
}

// ── State ─────────────────────────────────────────────────────────────────────
let viewDay = 1;
const todayOmer = getOmerDay();

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const e = DAYS[viewDay - 1];
  const isToday = (viewDay === todayOmer);
  const isSpecial = !!e.special;

  // Special banner
  const sb = document.getElementById("special-banner");
  if (isSpecial) { sb.textContent = e.special; sb.style.display = "block"; }
  else { sb.style.display = "none"; }

  // Today pill
  document.getElementById("today-pill").style.display = isToday ? "block" : "none";

  // Badge + labels
  document.getElementById("badge-num").textContent = e.day;
  document.getElementById("of49-text").textContent = `Day ${e.day} of 49`;
  document.getElementById("week-en-text").textContent = formatWeeksEnglish(e.day);

  // Penguin hat
  document.getElementById("penguin-hat").style.display = isSpecial ? "block" : "none";

  // Body
  document.getElementById("emoji-display").textContent = e.emoji;
  document.getElementById("fact-text").textContent = e.fact;
  document.getElementById("source-text").textContent = "— " + e.source;
  document.getElementById("hebrew-count").textContent = e.hCount;
  document.getElementById("hebrew-weeks").textContent = e.hWeeks;

  // Card background & border colour
  const card = document.getElementById("card");
  const cardTop = document.getElementById("card-top");
  const hbox = document.getElementById("hebrew-box");
  if (e.day === 33 || e.day === 49) {
    card.style.background = "#FFF9D0";
    card.style.borderColor = "#B37700";
    cardTop.style.background = "#F5C842";
    hbox.style.borderLeftColor = "#B37700";
  } else if (e.day % 7 === 0) {
    card.style.background = "#FFF3D0";
    card.style.borderColor = "#C47F00";
    cardTop.style.background = "#E8A000";
    hbox.style.borderLeftColor = "#C47F00";
  } else {
    card.style.background = "#FFF8E7";
    card.style.borderColor = "#E8A000";
    cardTop.style.background = "#E8A000";
    hbox.style.borderLeftColor = "#E8A000";
  }

  // Nav buttons
  document.getElementById("prev-btn").disabled = (viewDay <= 1);
  document.getElementById("next-btn").disabled = (viewDay >= 49);

  // Today button
  const todayBtn = document.getElementById("today-btn");
  const inRange = (todayOmer >= 1 && todayOmer <= 49);
  if (inRange && !isToday) {
    todayBtn.style.display = "block";
    document.getElementById("today-day-num").textContent = todayOmer;
  } else {
    todayBtn.style.display = "none";
  }

  // Progress
  document.getElementById("prog-left").textContent = `Day ${viewDay}`;
  document.getElementById("prog-right").textContent = `${Math.round((viewDay/49)*100)}% to Shavuot`;
  document.getElementById("progress-fill").style.width = `${(viewDay/49)*100}%`;

  // Dot buttons
  document.querySelectorAll(".dot-btn").forEach(btn => {
    const d = parseInt(btn.dataset.day);
    btn.classList.remove("active");
    if (d === viewDay) btn.classList.add("active");
  });
}

function changeDay(delta) {
  const next = viewDay + delta;
  if (next < 1 || next > 49) return;
  viewDay = next;
  render();
  // scroll active dot into view
  const activeDot = document.querySelector(".dot-btn.active");
  if (activeDot) activeDot.scrollIntoView({ inline: "center", behavior: "smooth", block: "nearest" });
}

function goToToday() {
  if (todayOmer >= 1 && todayOmer <= 49) { viewDay = todayOmer; render(); }
}

// ── Build dot buttons ─────────────────────────────────────────────────────────
(function buildDots() {
  const inner = document.getElementById("dots-inner");
  for (let d = 1; d <= 49; d++) {
    const btn = document.createElement("button");
    btn.className = "dot-btn " + (d % 7 === 0 ? "shabbat" : "regular");
    btn.dataset.day = d;
    btn.textContent = d;
    btn.addEventListener("click", () => { viewDay = d; render(); btn.scrollIntoView({ inline: "center", behavior: "smooth", block: "nearest" }); });
    inner.appendChild(btn);
  }
})();

// ── Status banner (pre/post Omer) ─────────────────────────────────────────────
(function showBanner() {
  const banner = document.getElementById("status-banner");
  if (todayOmer === 0) {
    banner.className = "pre";
    banner.style.display = "block";
    document.getElementById("banner-emoji").textContent = "🌾";
    document.getElementById("banner-title").textContent = "The Omer hasn't started yet";
    document.getElementById("banner-body").textContent = "Counting begins the evening of Thursday, April 2, 2026. Preview any day below.";
  } else if (todayOmer === 50) {
    banner.className = "post";
    banner.style.display = "block";
    document.getElementById("banner-emoji").textContent = "🌾✨";
    document.getElementById("banner-title").textContent = "Chag Sameach! The Omer is complete!";
    document.getElementById("banner-body").textContent = "Shavuot has arrived — may the Torah always be with you.";
  }
})();

// ── Initial view: jump to today if in range ───────────────────────────────────
if (todayOmer >= 1 && todayOmer <= 49) viewDay = todayOmer;
render();

// ── Touch / swipe ─────────────────────────────────────────────────────────────
let touchStartX = null;
const card = document.getElementById("card");
card.addEventListener("touchstart", e => { touchStartX = e.touches[0].clientX; }, { passive: true });
card.addEventListener("touchend", e => {
  if (touchStartX === null) return;
  const diff = touchStartX - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 50) changeDay(diff > 0 ? 1 : -1);
  touchStartX = null;
});

// ── Keyboard navigation ───────────────────────────────────────────────────────
document.addEventListener("keydown", e => {
  if (e.key === "ArrowLeft")  changeDay(-1);
  if (e.key === "ArrowRight") changeDay(1);
});
</script>
